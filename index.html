<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Drive RPG</title>

  <link rel="stylesheet" href="style.css" />

</head>

<body>

<div id="loginScreen">

  <div class="loginBox">

    <h1>Drive RPG</h1>

    <p>
      SHINOBI DATABOOK SYSTEM
    </p>

    <input
      type="text"
      id="loginUser"
      placeholder="Usuário"
    />

    <input
      type="password"
      id="loginPass"
      placeholder="Senha"
    />

    <button onclick="login()">
      Entrar
    </button>

  </div>

</div>

<div id="app">

  <header class="topbar">

    <div id="userInfo"></div>

    <button onclick="logout()">
      Logout
    </button>

  </header>

  <nav id="bottomNav"></nav>

  <section id="searchPage">

    <div class="panel">

      <h2>Pesquisa</h2>

      <input
        type="text"
        id="searchInput"
        placeholder="Pesquisar ficha..."
      />

    </div>

    <div id="cards"></div>

  </section>

  <section
    id="fichasPage"
    style="display:none;"
  >

    <div class="panel">

      <h2>Painel de Fichas</h2>

      <input
        type="text"
        id="nome"
        placeholder="Nome da ficha"
      />

      <input
        type="text"
        id="usuarios"
        placeholder="Usuários"
      />

      <textarea
        id="descricao"
        placeholder="Descrição..."
      ></textarea>

      <button onclick="salvarFicha()">
        Salvar Ficha
      </button>

    </div>

  </section>

  <section
    id="adminPage"
    style="display:none;"
  >

    <div class="panel">

      <h2>Admin</h2>

      <input
        type="text"
        id="novoUsuario"
        placeholder="Novo usuário"
      />

      <input
        type="text"
        id="novaSenha"
        placeholder="Senha"
      />

      <select id="novoCargo">

        <option value="editor">
          Editor
        </option>

        <option value="membro">
          Membro
        </option>

      </select>

      <button onclick="criarUsuario()">
        Criar Usuário
      </button>

    </div>

  </section>

</div>

<script
  type="module"
  src="script.js"
></script>

</body>
</html>
